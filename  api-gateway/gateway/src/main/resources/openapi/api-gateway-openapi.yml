openapi: 3.0.3
info:
  title: The SSS Platform - API Gateway
  version: v1.0.0
  description: >
    This API Gateway serves as the single entry point for all client requests and public API consumers. 
    It handles routing, authentication (JWT, API Key), authorization, rate limiting, resilience, logging, 
    monitoring, and integrates with service discovery and external services like Consent Management.
  contact:
    name: The SSS Platform Team
    email: support@thesssplatform.com
servers:
  - url: http://localhost:8080 # Replace with actual gateway URL in deployments
    description: Development server
  - url: https://api.thesssplatform.com # Replace with actual production gateway URL
    description: Production server

components:
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          description: The time the error occurred, as a Unix timestamp (milliseconds).
        status:
          type: integer
          description: The HTTP status code.
        error:
          type: string
          description: A short, human-readable summary of the problem.
        message:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        path:
          type: string
          description: The path of the request that resulted in an error.
        correlationId:
          type: string
          description: A unique identifier for the request, used for tracing.
        errorCode:
          type: string
          description: An application-specific error code. (Optional)
        details:
          type: array
          items:
            type: string
          description: A list of more specific error messages or validation failures. (Optional)
      required:
        - timestamp
        - status
        - error
        - message
        - path
        - correlationId

    FarmerData: # Example Schema, replace with actual
      type: object
      properties:
        farmerId:
          type: string
          format: uuid
        data:
          type: object
          additionalProperties: true

  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: API Key for client application authentication.
    oauth2Auth: # For JWT Bearer token
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 JWT Bearer token for user or service authentication.

paths:
  /api/v1/statistics/agricultural/**:
    get:
      summary: Access Agricultural Statistics
      description: Routes requests to the statistics service for agricultural data. (REQ-12-003)
      operationId: getAgriculturalStatistics
      tags:
        - Statistics
      security:
        - apiKeyAuth: []
        - oauth2Auth: [] # Requires JWT with appropriate scopes
      parameters:
        - name: WildcardPath
          in: path
          required: true
          description: The remainder of the path to be forwarded to the statistics service.
          schema:
            type: string
          example: "crop-yields/2023"
      responses:
        '200':
          description: Successful retrieval of statistics data.
          content:
            application/json:
              schema:
                type: object # Define actual response schema from statistics service
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized (Invalid API Key or JWT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden (Insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/v1/knowledge-base/**:
    get:
      summary: Access Knowledge Base Content
      description: Routes requests to the query management service for knowledge base articles and FAQs. (REQ-12-004)
      operationId: getKnowledgeBaseContent
      tags:
        - Knowledge Base
      security:
        - apiKeyAuth: []
        - oauth2Auth: []
      parameters:
        - name: WildcardPath
          in: path
          required: true
          description: The remainder of the path to be forwarded to the query management service.
          schema:
            type: string
          example: "articles/soil-preparation"
      responses:
        '200':
          description: Successful retrieval of knowledge base content.
          content:
            application/json:
              schema:
                type: object # Define actual response schema from query management service
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/weather/**:
    get:
      summary: Access Weather Information
      description: Routes requests to the weather service for forecasts and conditions. (REQ-12-005)
      operationId: getWeatherInformation
      tags:
        - Weather
      security:
        - apiKeyAuth: []
      parameters:
        - name: WildcardPath
          in: path
          required: true
          description: The remainder of the path to be forwarded to the weather service.
          schema:
            type: string
          example: "forecast?location=cityX"
      responses:
        '200':
          description: Successful retrieval of weather information.
          content:
            application/json:
              schema:
                type: object # Define actual response schema from weather service
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/farmer-data/{farmerId}/**:
    get:
      summary: Access Farmer Consented Data
      description: Routes requests for farmer-specific data to the farmer service, requiring explicit farmer consent. (REQ-12-006)
      operationId: getFarmerData
      tags:
        - Farmer Data
      security:
        - apiKeyAuth: [] # Third-party client API key
        - oauth2Auth: [] # User/Service JWT, potentially with specific scopes like 'farmer_data:read'
      parameters:
        - name: farmerId
          in: path
          required: true
          description: The unique identifier of the farmer.
          schema:
            type: string
            format: uuid
        - name: WildcardPath
          in: path
          required: true
          description: The remainder of the path for specific farmer data to be forwarded to the farmer service.
          schema:
            type: string
          example: "land-records"
      responses:
        '200':
          description: Successful retrieval of farmer consented data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FarmerData' # Example, replace with actual
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (Consent not granted or insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components: # Re-declaring for responses, can be merged with schemas and securitySchemes
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: Unauthorized (Invalid API Key or JWT)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: Forbidden (Insufficient permissions or access denied by policy)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'