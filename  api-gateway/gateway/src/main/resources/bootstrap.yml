spring:
  application:
    name: api-gateway # Should match the name in application.yml and config server
  profiles:
    active: default # Can be overridden by environment variable or command line argument
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888} # URI of the Spring Cloud Config Server
      fail-fast: true # Fail fast if config server is not available on startup
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 20
      # For Vault or other secure backends, you might need:
      # token: ${CONFIG_SERVER_TOKEN:}
      # username: ${CONFIG_SERVER_USERNAME:}
      # password: ${CONFIG_SERVER_PASSWORD:}
      # name: ${spring.application.name} # Explicitly set application name for config server lookup
      # profile: ${spring.profiles.active} # Explicitly set profiles for config server lookup

# To enable encryption/decryption of properties from config server
encrypt:
  key: ${CONFIG_ENCRYPTION_KEY:SuperSecretKey} # Example key, should be managed securely
  # key-store.location, key-store.password, key-store.alias for asymmetric encryption

# If using Spring Cloud Discovery for Config Server location (e.g., Config Server registered with Eureka)
# spring.cloud.config.discovery.enabled: true
# spring.cloud.config.discovery.service-id: config-server # Name of the config server in Eureka
# eureka.client.serviceUrl.defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  health:
    # Disable config client health indicator if it causes issues during bootstrap
    # config.enabled: false
    # Or ensure that fail-fast: false if config server health is not critical for app to start partially
    defaults:
      enabled: false # Disable all default health indicators during bootstrap phase to speed up

# Logging level for bootstrap phase (before main logback-spring.xml is loaded)
logging:
  level:
    org.springframework.cloud.config: INFO
    # com.thesss.platform.gateway: DEBUG # If you have bootstrap listeners