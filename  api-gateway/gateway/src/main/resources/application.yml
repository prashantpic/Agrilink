server:
  port: 8080

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Important for lb://SERVICE-ID format
      default-filters:
        - name: RemoveResponseHeader
          args:
            name: X-Powered-By # Example: Remove a common unnecessary header
        - name: Retry # Default retry configuration for routes
          args:
            retries: 2
            statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
            methods: GET,POST,PUT,DELETE # Be cautious with non-idempotent methods for retries
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false
        # Default Rate Limiter (Applied if not overridden per route)
        # - name: RequestRateLimiter
        #   args:
        #     redis-rate-limiter.replenishRate: 20
        #     redis-rate-limiter.burstCapacity: 40
        #     redis-rate-limiter.requestedTokens: 1
        #     key-resolver: '#{@principalNameKeyResolver}' # Requires a PrincipalNameKeyResolver bean and security context

      routes:
        # REQ-12-003: Route requests for Agricultural Statistics to the statistics-service
        - id: statistics_service_route
          uri: lb://statistics-service
          predicates:
            - Path=/api/v1/statistics/**
          filters:
            - StripPrefix=3 # /api/v1/statistics -> /
            - name: CircuitBreaker
              args:
                name: statisticsServiceCircuitBreaker
                # fallbackUri: forward:/fallback/statistics # Requires a fallback controller

        # REQ-12-004: Route requests for Knowledge Base content to the query-management-service
        - id: query_management_service_route
          uri: lb://query-management-service
          predicates:
            - Path=/api/v1/knowledge-base/**
          filters:
            - StripPrefix=3 # /api/v1/knowledge-base -> /
            - name: CircuitBreaker
              args:
                name: queryManagementServiceCircuitBreaker
                # fallbackUri: forward:/fallback/query

        # REQ-12-005: Route requests for Weather information to the weather-service
        - id: weather_service_route
          uri: lb://weather-service
          predicates:
            - Path=/api/v1/weather/**
          filters:
            - StripPrefix=3 # /api/v1/weather -> /
            - name: CircuitBreaker
              args:
                name: weatherServiceCircuitBreaker
                # fallbackUri: forward:/fallback/weather

        # REQ-12-006: Route requests for Farmer Consented Data to the farmer-service
        # ConsentCheckFilter will be applied programmatically in GatewayRouteConfig.java
        # API Key validation will also be applied programmatically or via SecurityConfig + AuthenticationFilterFactory
        - id: farmer_service_route
          uri: lb://farmer-service
          predicates:
            - Path=/api/v1/farmer-data/{farmerId}/**
          filters:
            - StripPrefix=3 # /api/v1/farmer-data -> /
            - name: CircuitBreaker
              args:
                name: farmerServiceCircuitBreaker
                # fallbackUri: forward:/fallback/farmer

        # Route for serving OpenAPI specification if needed (can also be done via controller)
        - id: openapi_spec_route
          uri: no://op # Will be handled by springdoc or a custom handler for the static file
          predicates:
            - Path=/openapi/api-gateway-openapi.yml # Path to the static OpenAPI YAML file
          filters:
            # This route might not forward, but serve a resource.
            # For now, this is a placeholder. Springdoc might serve it directly.
            # Or Gateway can be configured to serve static resources from classpath:/META-INF/resources or classpath:/static
            - name: SetPath
              args:
                template: /api-gateway-openapi.yml # Assuming it's in static resources

  # Redis configuration for Rate Limiter
  data:
    redis:
      host: ${REDIS_HOST_FOR_RATELIMITER:localhost}
      port: ${REDIS_PORT_FOR_RATELIMITER:6379}
      # password: ${REDIS_PASSWORD:} # Uncomment if Redis requires auth
      timeout: 5000ms # Connection and command timeout

  # Spring Security OAuth2 Resource Server (JWT Validation) - REQ-12-002
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/sss-platform} # Replace with your IdP issuer URI
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/realms/sss-platform/protocol/openid-connect/certs} # Replace with your IdP JWK Set URI

# Eureka Client Configuration (Service Discovery)
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true # important for Eureka to use Spring Boot Actuator health endpoint
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10 # Default 30
    lease-expiration-duration-in-seconds: 30 # Default 90
    hostname: ${APP_HOSTNAME:localhost} # Set via env var in containerized env

# Resilience4j Configuration - REQ-12-002 (part of securing API by making it resilient)
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20 # Number of requests in a closed state
        minimumNumberOfCalls: 10 # Minimum requests before calculating failure rate
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s # Duration to wait before transitioning from OPEN to HALF_OPEN
        failureRateThreshold: 50 # Percentage
        eventConsumerBufferSize: 10
    instances:
      statisticsServiceCircuitBreaker:
        baseConfig: default
      queryManagementServiceCircuitBreaker:
        baseConfig: default
      weatherServiceCircuitBreaker:
        baseConfig: default
      farmerServiceCircuitBreaker:
        baseConfig: default
      # Add more service-specific circuit breakers if needed
      authServiceCircuitBreaker: # For calls made by AuthenticationFilterFactory
        baseConfig: default
        failureRateThreshold: 70
      consentServiceCircuitBreaker: # For calls made by ConsentCheckFilterFactory
        baseConfig: default
        failureRateThreshold: 70
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms # Fixed wait duration
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignoreExceptions:
          - org.springframework.security.access.AccessDeniedException
          - com.thesss.platform.gateway.exception.ConsentNotGrantedException # Example custom exception
          - com.thesss.platform.gateway.exception.InvalidApiKeyException   # Example custom exception
    instances:
      defaultRetry: # Referenced by Spring Cloud Gateway Retry filter if name not specified
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s # Default timeout for downstream calls
        cancelRunningFuture: true
    instances:
      defaultTimeLimiter:
        baseConfig: default
        timeoutDuration: 3s
      # Specific time limiters can be defined and used in programmatic routes

# Logging Configuration (Levels) - REQ-12-007
logging:
  level:
    root: INFO
    com.thesss.platform.gateway: DEBUG # More detailed logs for gateway components
    org.springframework.cloud.gateway: INFO # Or TRACE for deep route debugging
    org.springframework.security: INFO # Or DEBUG for security filter chain issues
    reactor.netty.http.client: INFO # Can be noisy on DEBUG/TRACE
    io.lettuce.core: INFO # Redis client logging
  # Structured logging format is defined in logback-spring.xml

# Actuator Configuration - REQ-12-007 (Metrics and Monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,env,configprops,mappings,gateway,metrics,loggers,beans,conditions,circuitbreakers,ratelimiters # Expose necessary actuator endpoints
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized # or always for dev, never for prod if sensitive
      probes:
        enabled: true # For Kubernetes liveness/readiness probes
      group:
        liveness:
          include: livenessState,diskSpace
        readiness:
          include: readinessState,diskSpace,ping,eureka # Assuming Eureka health indicator
    prometheus:
      enabled: true # Expose /actuator/prometheus
    gateway:
      enabled: true # Exposes gateway routes and filters via actuator
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true # Enable histograms for request latencies
      sla:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s # Define SLA boundaries for metrics

# Springdoc OpenAPI Configuration - REQ-12-001
springdoc:
  api-docs:
    path: /v3/api-docs # Main OpenAPI spec endpoint
    enabled: true
  swagger-ui:
    path: /swagger-ui.html # Swagger UI path
    enabled: true
    urls:
      - name: Public API V1
        url: /v3/api-docs/public-api-v1 # Points to the grouped API spec
    # To use a static YAML file instead of generated one:
    # url: /openapi/api-gateway-openapi.yml # If served as a static resource
    # DefaultModelsExpandDepth: -1 # To hide schemas by default
    # operationsSorter: alpha
    # tagsSorter: alpha
  group-configs:
    - group: public-api-v1
      paths-to-match: /api/v1/**
      # packages-to-scan: com.thesss.platform.gateway.publicapi # If you have controllers defining these
      # To use the static openapi/api-gateway-openapi.yml for this group
      # This requires some custom configuration, usually springdoc generates from routes/controllers
      # For now, this group will be based on SCG routes matched.
      # The actual `api-gateway-openapi.yml` content will be defined and might be manually referenced or served.
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: true # To include actuator endpoints in OpenAPI docs (optional)
  writer-with-order-by-keys: true # For consistent output of OpenAPI spec

# Custom application properties / Feature Flags
app:
  feature-flags:
    ENABLE_CONSENT_FILTER_FOR_FARMER_DATA_API: true
    ENABLE_DETAILED_REQUEST_LOGGING_BODY: false # Be cautious enabling this in production
    USE_REMOTE_AUTH_SERVICE_FOR_API_KEYS: true
  security:
    api-key-header-name: "X-API-KEY" # Header name for API Key
  services:
    auth-service:
      base-url: "http://auth-service/auth" # Example internal URL for auth service (use Eureka lb:// eventually)
      validate-api-key-path: "/api/v1/keys/validate"
      introspect-token-path: "/api/v1/tokens/introspect"
    consent-service:
      base-url: "http://consent-service/consent" # Example internal URL for consent service
      verify-consent-path: "/api/v1/consents/verify"

# Micrometer settings for Prometheus (if not using Spring Boot's default auto-configuration)
# management.metrics.export.prometheus.enabled: true
# management.metrics.export.prometheus.step: 60s # How often to scrape

# HTTP Client settings (Reactor Netty)
spring.netty:
  connection-timeout: 2000 # milliseconds
  # response-timeout: 5s # global response timeout for outgoing requests (can be per-client)

# Default Redis Rate Limiter config (can be applied via default-filters or per-route)
# These properties are not standard Spring Cloud Gateway properties for default RedisRateLimiter config.
# Instead, you define a RateLimiter bean (Spring Cloud Gateway does this if redis is on classpath)
# and then reference it in filters or via default-filters, configuring replenishRate/burstCapacity there.
# The following are illustrative of what the RedisRateLimiter bean might use conceptually.
# spring.cloud.gateway.redis-rate-limiter.config.default.replenish-rate: 10
# spring.cloud.gateway.redis-rate-limiter.config.default.burst-capacity: 20
# spring.cloud.gateway.redis-rate-limiter.config.default.requested-tokens: 1

# Example for a named RateLimiter config that could be referenced in a custom filter if needed
# spring.cloud.gateway.redis-rate-limiter.config.myCustomLimiter.replenish-rate: 5
# spring.cloud.gateway.redis-rate-limiter.config.myCustomLimiter.burst-capacity: 10