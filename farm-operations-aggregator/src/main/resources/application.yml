spring:
  application:
    name: farm-operations-aggregator
  profiles:
    active: dev # Default profile

  # R2DBC (Reactive Database Connectivity) Configuration for Read Models
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farm_ops_agg_read_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  # Flyway Database Migration
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farm_ops_agg_read_db} # Flyway uses JDBC
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    locations: classpath:db/migration # Location of SQL migration scripts
    schemas: public # Schema to manage
    baseline-on-migrate: true # If the schema is not empty, Flyway will create its schema_version table and baseline it with version 1

  # Kafka Consumer Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: farm-ops-aggregator-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.thesss.platform.aggregators.event.dto.*,java.util.List,java.util.Map"
        spring.json.use.type.headers: "false" # If not using type headers from producer
        # spring.json.value.default.type: "..." # Optional: if specific DTO type for all messages on a topic
      # Auto offset reset for new consumer groups or when offset is out of range
      auto-offset-reset: earliest # Or 'latest', depending on requirements
    listener:
      # Configure concurrency for Kafka listeners (number of threads)
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3} # Adjust based on partition count and load

# Server Configuration (WebFlux)
server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful # Graceful shutdown for Netty

# Logging Configuration (can be customized in logback-spring.xml)
logging:
  level:
    root: INFO
    com.thesss.platform.aggregators: DEBUG
    org.springframework.r2dbc: INFO
    org.springframework.kafka: INFO
    io.r2dbc.postgresql: INFO
    reactor.netty.http.client: INFO


# Custom application properties
app:
  kafka:
    topics:
      farmer-events: ${KAFKA_TOPIC_FARMER_EVENTS:farmer-events}
      land-events: ${KAFKA_TOPIC_LAND_EVENTS:land-events}
      crop-events: ${KAFKA_TOPIC_CROP_EVENTS:crop-events}

  # Read model constants
  readmodel:
    system-stats-id: "singleton_system_stats"
    data-quality-metrics-id: "singleton_data_quality_metrics"

  # CORS Configuration (can also be done in WebFluxConfig.java)
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}" # Comma-separated list
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: "true"
    max-age: "3600"

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  health:
    # Show details for health indicators (e.g., db, diskSpace, kafka)
    show-details: always
    # R2DBC health indicator
    r2dbc:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Debezium specific consumer properties (if consuming from Debezium topics)
# These are standard Kafka consumer properties, Debezium configuration is on the source connector side.
# Ensure your Kafka topics are correctly configured if they are populated by Debezium.
# No specific Debezium client library configuration needed here if just consuming Kafka messages.
# If Debezium formats (like Avro with Schema Registry) are used, then Avro deserializers and schema registry URL would be needed.
# Assuming JSON messages from Debezium for simplicity as per initial setup.