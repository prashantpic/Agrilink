server:
  port: 8081 # Farmer Service port

spring:
  application:
    name: farmer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farmer_db} # Add ?ApplicationName=FarmerService for better logging
    username: ${DB_USERNAME:farmer_user}
    password: ${DB_PASSWORD:farmer_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Use Flyway or Liquibase for schema management
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # For PostGIS specific functions, ensure PostGIS extension is enabled on DB.
        # For JTS types to be properly handled with Hibernate 6+, ensure you have compatible JTS library and PostGIS JDBC driver.
        # If using Hibernate Spatial, the dialect would be org.hibernate.spatial.dialect.postgis.PostgisDialect
        default_schema: ${DB_SCHEMA:public}
        jdbc:
          lob:
            non_contextual_creation: true # If facing issues with LOB creation
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Creates the metadata table if it doesn't exist on first run
  # liquibase: # Alternatively, use Liquibase
  #   enabled: true
  #   change-log: classpath:db/changelog/db.changelog-master.yaml

  # Spring Cloud Discovery (Eureka Client)
  cloud:
    discovery:
      enabled: ${EUREKA_CLIENT_ENABLED:true} # Set to false if not using Eureka

# Eureka client configuration (if enabled)
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
    healthcheck:
      enabled: true # Important for Eureka to use Spring Boot Actuator health endpoint
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10 # Default 30
    lease-expiration-duration-in-seconds: 30 # Default 90
    # hostname: if running in Docker/K8s, this might need specific configuration

# Logging configuration
logging:
  level:
    root: INFO
    com.thesss.platform.farmer: DEBUG
    org.springframework.web: INFO
    org.springframework.orm.jpa: INFO
    org.hibernate.SQL: DEBUG # To see generated SQL
    org.hibernate.type.descriptor.sql: TRACE # To see SQL parameter binding

# Application specific properties
app:
  encryption:
    aes:
      # Store these securely, e.g., via environment variables, Vault, or Spring Cloud Config Server with encryption
      key: ${ENCRYPTION_AES_KEY:YOUR_SECURE_BASE64_ENCODED_AES_256_KEY} # Must be a valid Base64 encoded key (e.g., 32 bytes for AES-256)
      iv-spec: ${ENCRYPTION_AES_IV_SPEC:YOUR_SECURE_BASE64_ENCODED_IV} # Must be a valid Base64 encoded IV (e.g., 12 bytes for GCM)
  objectstorage:
    s3:
      region: ${AWS_S3_REGION:us-east-1}
      bucket-name: ${AWS_S3_BUCKET_NAME:thesss-farmer-profile-photos}
      # Credentials should be configured via AWS SDK default credential chain (e.g. EC2 instance profile, ECS task role, environment variables)
      # For local development, you can set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY environment variables
      # Or provide them here (NOT recommended for production):
      # access-key: ${AWS_S3_ACCESS_KEY:}
      # secret-key: ${AWS_S3_SECRET_KEY:}
      endpoint-override: ${AWS_S3_ENDPOINT_OVERRIDE:} # e.g., http://localhost:9000 for MinIO
      # For S3 Transfer Manager settings (optional)
      # transfer:
      #   max-concurrency: 10
      #   target-throughput-gbps: 2.0
  approval:
    critical-fields: "nationalIdentification.idNumber,bankAccounts.accountNumber,contactInformation.primaryPhoneNumber" # Comma-separated list of critical field paths
  features:
    enableAsyncApprovalEventPublishing: ${APP_FEATURE_ASYNC_APPROVAL:true}
    enableAdvancedFarmerSearchOptimizations: ${APP_FEATURE_ADVANCED_SEARCH_OPTS:false}

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*" # Expose all endpoints for simplicity in dev; restrict in prod (e.g., health, info, prometheus)
  endpoint:
    health:
      show-details: always # Or when-authorized

# Default page size for pagination if not specified in request
spring.data.web.pageable.default-page-size: 20
spring.data.web.pageable.max-page-size: 100

# Jackson serialization options
spring.jackson:
  serialization:
    write-dates-as-timestamps: false # Use ISO-8601 format for dates
  deserialization:
    fail-on-unknown-properties: false # Be more lenient with unknown properties in requests

